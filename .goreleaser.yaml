# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

before:
  hooks:
    - go mod tidy
    - sh -c "cd web && bun run build"
    - sh -c "rm -rf cmd/lele/web && mkdir -p cmd/lele/web && cp -R web/dist cmd/lele/web/dist"
    - go generate ./cmd/lele

builds:
  - id: lele
    env:
      - CGO_ENABLED=0
    tags:
      - stdjson
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.gitCommit={{ .ShortCommit }}
      - -X main.buildTime={{ .Date }}
      - -X main.goVersion={{ .Env.GOVERSION }}
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
      - riscv64
      - s390x
      - mips64
      - arm
    main: ./cmd/lele
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: riscv64
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: mips64
      - goos: freebsd
        goarch: s390x
      - goos: freebsd
        goarch: mips64
      - goos: freebsd
        goarch: arm
      - goos: darwin
        goarch: riscv64
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: mips64
      - goos: darwin
        goarch: arm

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# upx:
#    - enabled: true
#      compress: best
#      lzma: true

release:
  footer: >-

    ---


    **Install with one command:**


    ```sh

    curl -fsSL https://raw.githubusercontent.com/xilistudios/lele/main/install.sh | sh

    ```


    Or download the binaries directly from the assets below.
