services:
  # ─────────────────────────────────────────────
  # Lele Agent (one-shot query)
  #   docker compose run --rm lele-agent -m "Hello"
  # ─────────────────────────────────────────────
  lele-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lele-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/home/lele/.lele/config.json:ro
      - lele-workspace:/home/lele/.lele/workspace
    entrypoint: ["lele", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Lele Gateway (Long-running Bot)
  #   docker compose up lele-gateway
  # ─────────────────────────────────────────────
  lele-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lele-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/home/lele/.lele/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - lele-workspace:/home/lele/.lele/workspace
    command: ["gateway"]

volumes:
  lele-workspace:
